# Edited by Claude Code
[project]
site_name = "AI Workflows Guide"
site_url = "https://flightctl.github.io/ai-workflows/"
site_description = "Reusable AI coding workflows for Cursor, Claude Code, and other environments"
repo_url = "https://github.com/flightctl/ai-workflows"
repo_name = "flightctl/ai-workflows"
edit_uri = "edit/main/docs/"

nav = [
  {"Home" = "index.md"},
  {"Getting Started" = [
    {"Installation" = "getting-started/installation.md"},
    {"Quick Start" = "getting-started/quick-start.md"},
  ]},
  {"Workflows" = [
    {"Overview" = "workflows/index.md"},
    {"Bugfix" = "workflows/bugfix.md"},
    {"Code Review" = "workflows/code-review.md"},
    {"CVE Fix" = "workflows/cve-fix.md"},
    {"Design" = "workflows/design.md"},
    {"Docs Writer" = "workflows/docs-writer.md"},
    {"E2E Testing" = "workflows/e2e.md"},
    {"Implement" = "workflows/implement.md"},
    {"KCS" = "workflows/kcs.md"},
    {"PRD" = "workflows/prd.md"},
    {"Triage" = "workflows/triage.md"},
    {"AI-Ready" = "workflows/ai-ready.md"},
    {"Skill Reviewer" = "workflows/skill-reviewer.md"},
  ]},
  {"Development" = [
    {"Contributing" = "development/contributing.md"},
    {"Workflow Structure" = "development/workflow-structure.md"},
    {"Testing" = "development/testing.md"},
  ]},
  {"Reference" = [
    {"Installation Reference" = "reference/installation.md"},
    {"Configuration" = "reference/configuration.md"},
  ]},
]

[project.theme]
logo = "images/logo.svg"
favicon = "images/logo.svg"
language = "en"
features = [
  "navigation.tabs",
  "navigation.sections",
  "navigation.expand",
  "navigation.top",
  "toc.follow",
  "search.suggest",
  "search.highlight",
  "content.code.copy",
  "content.code.annotate",
  "content.action.edit",
]

[[project.theme.palette]]
media = "(prefers-color-scheme: light)"
scheme = "default"
primary = "indigo"
accent = "indigo"
toggle.icon = "lucide/sun"
toggle.name = "Switch to dark mode"

[[project.theme.palette]]
media = "(prefers-color-scheme: dark)"
scheme = "slate"
primary = "indigo"
accent = "indigo"
toggle.icon = "lucide/moon"
toggle.name = "Switch to light mode"

[[project.extra.social]]
icon = "fontawesome/brands/github"
link = "https://github.com/flightctl/ai-workflows"

[project.markdown_extensions.admonition]

[project.markdown_extensions.pymdownx.details]

[project.markdown_extensions.pymdownx.superfences]
custom_fences = [
  { name = "mermaid", class = "mermaid", format = "pymdownx.superfences.fence_code_format" },
]

[project.markdown_extensions.pymdownx.tabbed]
alternate_style = true

[project.markdown_extensions.pymdownx.highlight]
anchor_linenums = true

[project.markdown_extensions.pymdownx.inlinehilite]

[project.markdown_extensions.pymdownx.snippets]

[project.markdown_extensions.pymdownx.emoji]
emoji_index = "zensical.extensions.emoji.twemoji"
emoji_generator = "zensical.extensions.emoji.to_svg"

[project.markdown_extensions.attr_list]

[project.markdown_extensions.md_in_html]

[project.markdown_extensions.tables]

[project.markdown_extensions.toc]
permalink = true

[project.markdown_extensions.zensical.extensions.glightbox]
